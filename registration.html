            <h2>Register to join as Member in Food and Fitness</h2>
            <h3>Contact Us Today</h3>
            <p>Required fields are marked with an asterisk *</p>

            <form method="post" action="https://webdevbasics.net/scripts/pacific.phd">

                    <label for="myFName"> *First Name: </label>
                    <input type="text" id="myFName" name="myFName" required="required">

                    <input type="text" id="myLName" name="myLName" required="required">

                    <input type="date" id="myDOB" name="myDOB">

                    <label for="myEmail"> *Email: </label>
                    <input type="email" id="myEmail" name="myEmail" required="required">

                    <label for="myPhone"> Phone: </label>
                    <input type="tel" id="myPhone" name="myPhone">

                    <label for="myComments">*Comments:</label>
                    <textarea id="myComments" name="myComments" rows="4" cols="50" required="required">
                    </textarea>
                    <input type="submit" value="Submit" 
                </form>
